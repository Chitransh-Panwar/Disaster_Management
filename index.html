<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Map App Shell</title>

  <!-- Leaflet (Task 2 will initialize the map) -->
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
    crossorigin=""
  />

  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <header class="topbar" role="banner">
    <div class="topbar__logo" aria-label="App logo">MapShell</div>
    <nav id="scenarioBar" class="topbar__scenarios" aria-label="Scenarios">
      <button type="button" class="scenario-btn" data-scenario="kerala-2018">Kerala 2018</button>
      <button type="button" class="scenario-btn" data-scenario="uttarakhand-2013">Uttarakhand 2013</button>
      <button type="button" class="scenario-btn" data-scenario="gujarat-2001">Gujarat 2001</button>
      <button type="button" class="scenario-btn" data-scenario="chennai-2015">Chennai 2015</button>
      <button type="button" class="scenario-btn" data-scenario="fani-2019">Fani 2019</button>
    </nav>
  </header>

  <main class="app" role="main">
    <div id="map" aria-label="Map"></div>

    <!-- Left tools panel + toggle -->
    <button id="leftToggle" class="panel-toggle panel-toggle--left" type="button" aria-controls="leftPanel" aria-expanded="false">
      ◀ Tools
    </button>
    <aside id="leftPanel" class="panel panel--left" aria-label="Tools panel">
      <div class="panel__header">Tools</div>
      <div class="panel__content">
        <div id="leftPanelBody"></div>
      </div>
    </aside>

    <!-- Right data panel + toggle -->
    <button id="rightToggle" class="panel-toggle panel-toggle--right" type="button" aria-controls="rightPanel" aria-expanded="false">
      ▶ Data
    </button>
    <aside id="rightPanel" class="panel panel--right" aria-label="Data panel">
      <div class="panel__header">
        <div class="tabs" role="tablist" aria-label="Data tabs">
          <button class="tab-btn" type="button" role="tab" aria-selected="true" aria-controls="tab-resources" id="tabBtnResources">Resources</button>
          <button class="tab-btn" type="button" role="tab" aria-selected="false" aria-controls="tab-stats" id="tabBtnStats">Stats</button>
          <button class="tab-btn" type="button" role="tab" aria-selected="false" aria-controls="tab-log" id="tabBtnLog">Log</button>
        </div>
      </div>

      <div class="panel__content">
        <section id="tab-resources" class="tab-panel" role="tabpanel" aria-labelledby="tabBtnResources">
          <!-- Task 1: container only -->
        </section>
        <section id="tab-stats" class="tab-panel" role="tabpanel" aria-labelledby="tabBtnStats" hidden>
          <!-- Task 1: container only -->
        </section>
        <section id="tab-log" class="tab-panel" role="tabpanel" aria-labelledby="tabBtnLog" hidden>
          <!-- Task 1: container only -->
        </section>
      </div>
    </aside>
  </main>

  <script
    src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
    crossorigin=""
  ></script>
  <script type="module" src="js/app.js"></script>
</body>
</html>
